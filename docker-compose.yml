services:
  nexapex-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    expose:
      - 3011
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      nexapex-backend:
        condition: service_healthy
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexapex-frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.nexapex-frontend.entrypoints=websecure"
      - "traefik.http.routers.nexapex-frontend.tls.certResolver=letsencrypt"
      - "traefik.http.services.nexapex-frontend.loadbalancer.server.port=3011"

  nexapex-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - 8054
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - DEBUG=${DEBUG:-false}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8054/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexapex-backend.rule=Host(`${BACKEND_DOMAIN}`)"
      - "traefik.http.routers.nexapex-backend.entrypoints=websecure"
      - "traefik.http.routers.nexapex-backend.tls.certResolver=letsencrypt"
      - "traefik.http.services.nexapex-backend.loadbalancer.server.port=8054"

networks:
  dokploy-network:
    external: true
