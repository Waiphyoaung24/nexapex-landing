# ============================================================
# NexApex - Docker Compose
# Two-container setup: Next.js frontend + FastAPI backend
# Dokploy manages domains/SSL via UI — no Traefik labels needed
# ============================================================

services:
  nexapex-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3011:3011"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - BACKEND_URL=http://nexapex-backend:8054
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      nexapex-backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - dokploy-network
      - internal

  nexapex-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8054:8054"
    volumes:
      - backend-models:/app/models
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - DEBUG=${DEBUG:-false}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8054/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - dokploy-network
      - internal

volumes:
  backend-models:

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge
