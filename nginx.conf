server {
    listen 85;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Health check endpoint — responds instantly for Docker/Traefik health probes
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|otf|ttf|glb)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Astro static site routing — serve file, then try .html, then directory index
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Custom 502 page — show a retry message instead of ugly default
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="5"><title>NexApex — Loading</title><style>body{background:#0e1418;color:#c8ccc6;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}div{text-align:center}h1{color:#94fcff;font-size:1.2rem;letter-spacing:0.2em;text-transform:uppercase}p{opacity:0.6;font-size:0.9rem}</style></head><body><div><h1>Deploying</h1><p>The site is updating. This page will refresh automatically.</p></div></body></html>';
    }
}
